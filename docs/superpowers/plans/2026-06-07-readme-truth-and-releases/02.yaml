tasks:
- number: 1
  title: Fix the release.yml case mismatch
  steps:
  - id: P2.T1.S1
    text: |
      In `.github/workflows/release.yml` line 99, change:

          echo "See docs/macos-code-signing.md for setup instructions."

      to:

          echo "See docs/MACOS-CODE-SIGNING.md for setup instructions."
  - id: P2.T1.S2
    text: |
      Re-run `npx jest --config jest.server.config.js --testPathPattern="docs-references"`.
      Expected: the workflow-files test now PASSES; only the `CHANGELOG.md` failure remains.
- number: 2
  title: Fix RELEASE_CHECKLIST.md inconsistencies
  steps:
  - id: P2.T2.S1
    text: |
      In `RELEASE_CHECKLIST.md`:
      1. Delete the line referencing `CHANGELOG.md` (release notes are auto-generated by CI from git log — that is the system of record).
      2. Delete the `npm run lint` line (no lint script exists).
      3. In the artifact checklist, add a Linux `.rpm` item next to the AppImage/deb items (CI builds it).
      4. Update the example tag commands from `v1.0.0` to `v0.2.0` (and the hotfix example `v1.0.1` to `v0.2.1`) to match the project's pre-1.0 versioning.
  - id: P2.T2.S2
    text: |
      Re-run the docs-references test. Expected: ALL tests pass (green).
- number: 3
  title: Full server suite green
  steps:
  - id: P2.T3.S1
    text: |
      Run the complete server suite:

          npx jest --config jest.server.config.js

      Expected: all suites pass (api, claudeSessionScanner, workspaceScanner, docs-references).
