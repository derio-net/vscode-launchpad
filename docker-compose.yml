services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vscode-launchpad
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-3010}:3010"
    environment:
      - NODE_ENV=production
      - DASHBOARD_PORT=3010
      - HOST=0.0.0.0
      # Inside the container, the app reads WORKSPACES_MOUNT_POINT to find workspaces.
      # The host path (set in .env) is mounted to /workspaces, so we point the app there.
      - WORKSPACES_MOUNT_POINT=/workspaces
    volumes:
      - "${WORKSPACES_MOUNT_POINT:-./workspaces}:/workspaces:ro"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - |
          test -d /workspaces &&
          test -r /workspaces &&
          [ -n "$(ls -A /workspaces 2>/dev/null)" ] &&
          node -e "require('http').get('http://localhost:3010', (r) => {
            if (r.statusCode !== 200) throw new Error(r.statusCode)
          })"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
