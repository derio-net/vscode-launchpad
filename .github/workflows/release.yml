name: Release

on:
  push:
    tags:
      - 'v*'
      - 'v*-beta.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build full application (React frontend + sidecar + Tauri desktop app) per platform
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            pkg-target: 'node18-macos-arm64'
            triple: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            pkg-target: 'node18-macos-x64'
            triple: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            pkg-target: 'node18-linux-x64'
            triple: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            pkg-target: 'node18-win-x64'
            triple: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          cat src-tauri/tauri.conf.json | jq '.version'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build React frontend
        run: npm run build

      - name: Build sidecar binary
        shell: bash
        run: |
          EXTENSION=""
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            EXTENSION=".exe"
          fi
          npx pkg server/index.js \
            --config pkg.config.json \
            --targets "${{ matrix.pkg-target }}" \
            --output "src-tauri/binaries/sidecar-vscode-dashboard-${{ matrix.triple }}${EXTENSION}"

      - name: Make sidecar executable (Unix)
        if: matrix.platform != 'windows-latest'
        run: chmod +x src-tauri/binaries/sidecar-vscode-dashboard*

      - name: Warn if macOS code signing is not configured
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE == ''
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          echo "::warning::macOS code signing skipped — APPLE_CERTIFICATE secret is not configured."
          echo "To enable signing, add APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, and APPLE_SIGNING_IDENTITY secrets."
          echo "See docs/MACOS-CODE-SIGNING.md for setup instructions."

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VS Code Launchpad ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          args: ${{ matrix.args }}

      # macOS 26+ requires notarization for binaries signed with a developer
      # certificate AND hardened runtime. The sidecar (pkg-bundled Node.js) gets
      # the hardened runtime flag when Tauri signs the bundle, but cannot be
      # notarized (no Apple notarization credentials configured). Ad-hoc signing
      # the sidecar avoids the notarization requirement while keeping the main
      # app properly signed.
      #
      # IMPORTANT: Do NOT use --deep when re-signing the bundle — that would
      # re-apply the hardened runtime to the sidecar. Without --deep, the
      # sidecar's ad-hoc signature is preserved and the bundle CodeDirectory
      # is updated with the correct hashes.
      - name: Fix sidecar signing for macOS 26+ notarization requirement
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/VS Code Launchpad.app"
          SIDECAR_PATH="$APP_PATH/Contents/MacOS/sidecar-vscode-dashboard"

          if [ ! -f "$SIDECAR_PATH" ]; then
            echo "Warning: Sidecar binary not found at $SIDECAR_PATH, skipping fixup"
            exit 0
          fi

          echo "Removing developer signature from sidecar..."
          codesign --remove-signature "$SIDECAR_PATH"

          echo "Applying ad-hoc signature to sidecar (avoids hardened runtime)..."
          codesign -s - "$SIDECAR_PATH"

          # Re-sign the bundle WITHOUT --deep so the sidecar keeps its ad-hoc
          # signature. The bundle CodeDirectory is updated with the current
          # nested-code hashes, so validation still passes.
          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Re-signing bundle with developer identity: $APPLE_SIGNING_IDENTITY"
            codesign -f -s "$APPLE_SIGNING_IDENTITY" "$APP_PATH"
          else
            echo "No signing identity, ad-hoc signing bundle..."
            codesign -f -s - "$APP_PATH"
          fi

          echo "Verifying sidecar signature:"
          codesign -d -vvv "$SIDECAR_PATH" 2>&1 | grep -E "flags=|Signature=" || true

          echo "Verifying app bundle signature:"
          codesign --verify -v --strict --deep "$APP_PATH" 2>&1

      - name: Rename release assets with platform label
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLATFORM=""
          case "${{ matrix.platform }}" in
            macos-latest) PLATFORM="macos" ;;
            ubuntu-22.04) PLATFORM="linux" ;;
            windows-latest) PLATFORM="windows" ;;
          esac

          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${{ github.ref_name }}"

          # Draft releases are not returned by /releases/tags/, must search all releases
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases" --jq ".[] | select(.tag_name == \"$TAG\") | .id" | head -1)
          if [ -z "$RELEASE_ID" ]; then
            echo "Warning: release not found for tag $TAG, skipping rename"
            exit 0
          fi

          # Build extension-to-platform mapping for this job
          EXTENSIONS=""
          case "$PLATFORM" in
            macos)   EXTENSIONS="dmg|app.tar.gz" ;;
            linux)   EXTENSIONS="deb|AppImage|rpm" ;;
            windows) EXTENSIONS="exe|msi" ;;
          esac

          # Query release assets and filter to this platform's file types
          ASSETS_JSON=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets")
          ASSET_COUNT=$(echo "$ASSETS_JSON" | jq 'length')
          echo "Found $ASSET_COUNT total release assets"

          for i in $(seq 0 $((ASSET_COUNT - 1))); do
            ASSET_ID=$(echo "$ASSETS_JSON" | jq -r ".[$i].id")
            OLD_NAME=$(echo "$ASSETS_JSON" | jq -r ".[$i].name")

            # Skip assets already renamed by another matrix job
            case "$OLD_NAME" in *_macos_*|*_linux_*|*_windows_*) continue ;; esac

            # Skip assets that don't match this platform's extensions
            MATCH=false
            if echo "$OLD_NAME" | grep -qE "\.(${EXTENSIONS})$"; then
              MATCH=true
            fi
            if [ "$MATCH" != "true" ]; then continue; fi

            # Insert platform label after product name
            if echo "$OLD_NAME" | grep -q "^VS\.Code\.Launchpad_"; then
              NEW_NAME=$(echo "$OLD_NAME" | sed "s/^VS\.Code\.Launchpad_/VS.Code.Launchpad_${PLATFORM}_/")
            elif echo "$OLD_NAME" | grep -q "^VS\.Code\.Launchpad-"; then
              NEW_NAME=$(echo "$OLD_NAME" | sed "s/^VS\.Code\.Launchpad-/VS.Code.Launchpad_${PLATFORM}_/")
            else
              continue
            fi

            # Add version to .app.tar.gz files that lack it
            # Insert before arch segment to match other artifacts: {product}_{platform}_{version}_{arch}.app.tar.gz
            if echo "$NEW_NAME" | grep -q "\.app\.tar\.gz$"; then
              if ! echo "$NEW_NAME" | grep -q "$VERSION"; then
                NEW_NAME=$(echo "$NEW_NAME" | sed "s/_\([^_]*\)\.app\.tar\.gz$/_${VERSION}_\1.app.tar.gz/")
              fi
            fi

            gh api "repos/${{ github.repository }}/releases/assets/$ASSET_ID" \
              -X PATCH -f name="$NEW_NAME" > /dev/null
            echo "Renamed: $OLD_NAME -> $NEW_NAME"
          done

  # Update release notes (GitHub auto-generated, grouped by PR label)
  update-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update release with auto-generated notes
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
