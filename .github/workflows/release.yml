name: Release

on:
  push:
    tags:
      - 'v*'
      - 'v*-beta.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build full application (React frontend + sidecar + Tauri desktop app) per platform
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            pkg-target: 'node18-macos-arm64'
            triple: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            pkg-target: 'node18-macos-x64'
            triple: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            pkg-target: 'node18-linux-x64'
            triple: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            pkg-target: 'node18-win-x64'
            triple: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          cat src-tauri/tauri.conf.json | jq '.version'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build React frontend
        run: npm run build

      - name: Build sidecar binary
        shell: bash
        run: |
          EXTENSION=""
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            EXTENSION=".exe"
          fi
          npx pkg server/index.js \
            --config pkg.config.json \
            --targets "${{ matrix.pkg-target }}" \
            --output "src-tauri/binaries/sidecar-vscode-dashboard-${{ matrix.triple }}${EXTENSION}"

      - name: Make sidecar executable (Unix)
        if: matrix.platform != 'windows-latest'
        run: chmod +x src-tauri/binaries/sidecar-vscode-dashboard*

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To enable code signing, add the following secrets to your repository:
          # macOS: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          #        APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          # Windows: WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VS Code Launchpad ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          args: ${{ matrix.args }}

      - name: Rename release assets with platform label
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLATFORM=""
          case "${{ matrix.platform }}" in
            macos-latest) PLATFORM="macos" ;;
            ubuntu-22.04) PLATFORM="linux" ;;
            windows-latest) PLATFORM="windows" ;;
          esac

          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${{ github.ref_name }}"

          # Draft releases are not returned by /releases/tags/, must search all releases
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases" --jq ".[] | select(.tag_name == \"$TAG\") | .id" | head -1)
          if [ -z "$RELEASE_ID" ]; then
            echo "Warning: release not found for tag $TAG, skipping rename"
            exit 0
          fi

          # Rename all assets uploaded by this matrix job
          # Query release assets directly rather than relying on artifactPaths
          # (Tauri auto-generates .app.tar.gz files not listed in artifactPaths)
          ASSETS_JSON=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets")

          echo "$ASSETS_JSON" | jq -r '.[] | "\(.id)\t\(.name)"' | while IFS=$'\t' read -r ASSET_ID OLD_NAME; do
            # Skip assets already renamed by another matrix job
            if [[ "$OLD_NAME" == *_macos_* ]] || [[ "$OLD_NAME" == *_linux_* ]] || [[ "$OLD_NAME" == *_windows_* ]]; then
              continue
            fi

            # Only rename assets that belong to this platform's build
            DOMINATED=false
            case "$PLATFORM" in
              macos)  [[ "$OLD_NAME" == *.dmg ]] || [[ "$OLD_NAME" == *.app.tar.gz ]] && DOMINATED=true ;;
              linux)  [[ "$OLD_NAME" == *.deb ]] || [[ "$OLD_NAME" == *.AppImage ]] || [[ "$OLD_NAME" == *.rpm ]] && DOMINATED=true ;;
              windows) [[ "$OLD_NAME" == *.exe ]] || [[ "$OLD_NAME" == *.msi ]] && DOMINATED=true ;;
            esac
            if [ "$DOMINATED" != "true" ]; then
              continue
            fi

            NEW_NAME=""
            if [[ "$OLD_NAME" == VS.Code.Launchpad_* ]]; then
              NEW_NAME="${OLD_NAME/VS.Code.Launchpad_/VS.Code.Launchpad_${PLATFORM}_}"
            elif [[ "$OLD_NAME" == VS.Code.Launchpad-* ]]; then
              NEW_NAME="${OLD_NAME/VS.Code.Launchpad-/VS.Code.Launchpad_${PLATFORM}_}"
            else
              continue
            fi

            # Add version to .app.tar.gz files that lack it
            if [[ "$NEW_NAME" == *".app.tar.gz" ]] && [[ "$NEW_NAME" != *"$VERSION"* ]]; then
              NEW_NAME="${NEW_NAME/.app.tar.gz/_${VERSION}.app.tar.gz}"
            fi

            gh api "repos/${{ github.repository }}/releases/assets/$ASSET_ID" \
              -X PATCH -f name="$NEW_NAME" > /dev/null
            echo "Renamed: $OLD_NAME → $NEW_NAME"
          done

  # Update release notes
  update-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release-notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG_NAME"^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "Changes since $PREV_TAG:" > release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s" "$PREV_TAG".."$TAG_NAME" >> release_notes.md
          else
            echo "Initial release" > release_notes.md
          fi

          cat release_notes.md
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Update release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
