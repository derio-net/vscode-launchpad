name: Release

on:
  push:
    tags:
      - 'v*'
      - 'v*-beta.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build sidecar binaries first
  build-sidecar:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - node18-macos-x64
          - node18-macos-arm64
          - node18-linux-x64
          - node18-win-x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install pkg
        run: npm install -g pkg

      - name: Build sidecar binary
        run: |
          pkg server/index.js --config pkg.config.json --targets ${{ matrix.target }} --output src-tauri/binaries/sidecar-vscode-dashboard

      - name: Rename binary with platform suffix
        run: |
          cd src-tauri/binaries
          if [ "${{ matrix.target }}" = "node18-macos-x64" ]; then
            mv sidecar-vscode-dashboard sidecar-vscode-dashboard-x86_64-apple-darwin
          elif [ "${{ matrix.target }}" = "node18-macos-arm64" ]; then
            mv sidecar-vscode-dashboard sidecar-vscode-dashboard-aarch64-apple-darwin
          elif [ "${{ matrix.target }}" = "node18-linux-x64" ]; then
            mv sidecar-vscode-dashboard sidecar-vscode-dashboard-x86_64-unknown-linux-gnu
          elif [ "${{ matrix.target }}" = "node18-win-x64" ]; then
            mv sidecar-vscode-dashboard sidecar-vscode-dashboard-x86_64-pc-windows-msvc.exe
          fi

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: src-tauri/binaries/sidecar-vscode-dashboard*

  # Build Tauri application
  build-tauri:
    needs: build-sidecar
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            sidecar: 'node18-macos-arm64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            sidecar: 'node18-macos-x64'
          - platform: 'ubuntu-22.04'
            args: ''
            sidecar: 'node18-linux-x64'
          - platform: 'windows-latest'
            args: ''
            sidecar: 'node18-win-x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Node.js dependencies
        run: npm ci

      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.sidecar }}
          path: src-tauri/binaries/

      - name: Make sidecar executable (Unix)
        if: matrix.platform != 'windows-latest'
        run: chmod +x src-tauri/binaries/sidecar-vscode-dashboard*

      - name: Build sidecar binary name
        id: sidecar-name
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            if [[ "${{ matrix.args }}" == *"aarch64"* ]]; then
              echo "name=sidecar-vscode-dashboard-aarch64-apple-darwin" >> $GITHUB_OUTPUT
            else
              echo "name=sidecar-vscode-dashboard-x86_64-apple-darwin" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            echo "name=sidecar-vscode-dashboard-x86_64-unknown-linux-gnu" >> $GITHUB_OUTPUT
          else
            echo "name=sidecar-vscode-dashboard-x86_64-pc-windows-msvc.exe" >> $GITHUB_OUTPUT
          fi

      - name: Rename sidecar for Tauri
        shell: bash
        run: |
          cd src-tauri/binaries
          mv ${{ steps.sidecar-name.outputs.name }} sidecar-vscode-dashboard${{ matrix.platform == 'windows-latest' && '.exe' || '' }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VS Code Launchpad ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          args: ${{ matrix.args }}

  # Update release notes
  update-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release-notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            echo "Changes since $PREV_TAG:" > release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s" $PREV_TAG..${{ github.ref_name }} >> release_notes.md
          else
            echo "Initial release" > release_notes.md
          fi
          
          cat release_notes.md

      - name: Update release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
